<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Your Avatar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111; color: #fff; font-family: sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; gap: 24px; text-align: center;
    }
    h1 { font-size: 24px; }
    p { font-size: 14px; color: #aaa; line-height: 1.6; }
    #startBtn {
      display: block; background: #aaff00; color: #000;
      font-weight: bold; font-size: 18px; padding: 16px 32px;
      border-radius: 12px; text-decoration: none;
      width: 100%; max-width: 400px; border: none; cursor: pointer;
    }
    #iframeContainer {
      display: none; width: 100%; max-width: 480px;
      height: 80vh; border-radius: 12px; overflow: hidden;
    }
    #avaturnFrame { width: 100%; height: 100%; border: none; }
    #success { display: none; font-size: 20px; color: #aaff00; }
    #status { font-size: 13px; color: #aaa; word-break: break-all; max-width: 480px; }
  </style>
</head>
<body>
  <h1>🎮 Create Your VR Avatar</h1>
  <p>Create your avatar below — it will save to your headset automatically!</p>
  <button id="startBtn" onclick="openAvaturn()">Open Avaturn →</button>
  <div id="iframeContainer">
    <iframe id="avaturnFrame"
      src="https://parallelverse.avaturn.dev"
      allow="camera; microphone">
    </iframe>
  </div>
  <div id="status">Waiting for avatar...</div>
  <div id="success">✅ Avatar saved! Put your headset back on.</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC1vhDKaNBNRaToxL6dF-MTeHpnvZthHro",
      authDomain: "avaturn-vr.firebaseapp.com",
      databaseURL: "https://avaturn-vr-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "avaturn-vr",
      storageBucket: "avaturn-vr.firebasestorage.app",
      messagingSenderId: "477412928056",
      appId: "1:477412928056:web:e0654f7d5ea50bc80f54cd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);

    window.openAvaturn = function() {
      document.getElementById("startBtn").style.display = "none";
      document.getElementById("iframeContainer").style.display = "block";
      document.getElementById("status").textContent = "Customize your avatar, then click Next...";
    };

    window.addEventListener("message", async (event) => {
      const data = event.data;
      if (!data) return;

      // Avaturn v2 event
      if (data.eventName === "v2.avatar.exported" && data.data?.url) {
        const dataUrl = data.data.url;

        document.getElementById("status").textContent = "⏳ Uploading avatar to cloud...";
        document.getElementById("iframeContainer").style.display = "none";

        try {
          // Convert base64 data URL to blob
          const res = await fetch(dataUrl);
          const blob = await res.blob();

          // Upload to Firebase Storage
          const avatarRef = storageRef(storage, "avatars/avatar.glb");
          await uploadBytes(avatarRef, blob, { contentType: "model/gltf-binary" });

          // Get download URL
          const downloadURL = await getDownloadURL(avatarRef);

          // Save download URL to Realtime Database
          await set(ref(db, "avatar/url"), downloadURL);
          await set(ref(db, "avatar/timestamp"), Date.now());

          document.getElementById("success").style.display = "block";
          document.getElementById("status").textContent = "✅ Done! URL: " + downloadURL.substring(0, 60) + "...";

        } catch (err) {
          document.getElementById("status").textContent = "❌ Error: " + err.message;
        }
      }
    });
  </script>
</body>
</html>
