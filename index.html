<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Your Avatar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111; color: #fff; font-family: sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; gap: 24px; text-align: center;
    }
    h1 { font-size: 24px; }
    p { font-size: 14px; color: #aaa; line-height: 1.6; }
   #startBtn {
  display: block; background: #aaff00; color: #000;
      font-weight: bold; font-size: 18px; padding: 16px 32px;
      border-radius: 12px; width: 100%; max-width: 400px;
      border: none; cursor: pointer;
    }
   #startBtn:hover { background: #88dd00; }
    #avaturn-sdk-container {
      display: none; width: 100%; max-width: 480px;
      height: 80vh; border-radius: 12px; overflow: hidden;
    }
    #avaturn-sdk-container iframe {
      width: 100%; height: 100%; border: none;
    }
   #success { display: none; font-size: 20px; color: #aaff00; }
    #status { font-size: 13px; color: #aaa; word-break: break-all; max-width: 480px; }
    #progressBar {
      display: none; width: 100%; max-width: 400px;
      height: 8px; background: #333; border-radius: 4px; overflow: hidden;
    }
    #progressFill {
  height: 100%; background: #aaff00; width: 0%;
      transition: width 0.2s ease;
    }
  </style>
</head>
<body>
  <h1> Create Your VR Avatar</h1>
  <p>Create your avatar below — it will save to your headset automatically!</p>
  <button id="startBtn" onclick="openAvaturn()">Open Avaturn →</button>
  <div id="avaturn-sdk-container"></div>
  <div id="progressBar"><div id="progressFill"></div></div>
  <div id="status">Waiting for avatar...</div>
  <div id="success"> Avatar saved! Put your headset back on.</div>

  <script type="module">
    import { AvaturnSDK } from "https://cdn.jsdelivr.net/npm/@avaturn/sdk/dist/index.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const CLOUDINARY_CLOUD_NAME = "dzqu5dhcu";
    const CLOUDINARY_UPLOAD_PRESET = "avatars";

    const firebaseConfig = {
      apiKey: "AIzaSyC1vhDKaNBNRaToxL6dF-MTeHpnvZthHro",
      authDomain: "avaturn-vr.firebaseapp.com",
      databaseURL: "https://avaturn-vr-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "avaturn-vr",
      storageBucket: "avaturn-vr.firebasestorage.app",
      messagingSenderId: "477412928056",
      appId: "1:477412928056:web:e0654f7d5ea50bc80f54cd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function setProgress(percent) {
      document.getElementById("progressBar").style.display = "block";
      document.getElementById("progressFill").style.width = percent + "%";
    }

    async function uploadToCloudinary(dataUrl) {
      // Convert base64 data URL to blob
      const res = await fetch(dataUrl);
      const blob = await res.blob();

      const formData = new FormData();
      formData.append("file", blob, "avatar.glb");
      formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
      formData.append("resource_type", "raw");

      const response = await fetch(
        `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/raw/upload`,
        { method: "POST", body: formData }
      );

      if (!response.ok) {
        const err = await response.text();
        throw new Error("Cloudinary upload failed: " + err);
      }

      const result = await response.json();
      return result.secure_url;
    }

    // ✅ NEW: Helper to auto-set animation after SDK is ready
    async function setDefaultAnimation(sdk) {
      try {
        const animations = await sdk.getAnimationList();
        console.log("Available animations:", animations);
        if (animations && animations.length > 0) {
          await sdk.setActiveAnimation(animations[0].id);
          console.log("✅ Animation set:", animations[0].id);
        }
      } catch (e) {
        console.warn("⚠️ Could not set animation (may not be supported on this subdomain):", e);
      }
    }

    window.openAvaturn = async function() {
      document.getElementById("startBtn").style.display = "none";
      document.getElementById("avaturn-sdk-container").style.display = "block";
      document.getElementById("status").textContent = "Loading Avaturn...";

      const container = document.getElementById("avaturn-sdk-container");
      const sdk = new AvaturnSDK();

      await sdk.init(container, {
        url: "https://parallelverse.avaturn.dev"
      });

      // ✅ NEW: Try to set animation via "load" event (works with Avaturn API sessions)
      sdk.on("load", async () => {
        console.log("Avaturn loaded, setting animation...");
        await setDefaultAnimation(sdk);
      });

      // ✅ NEW: Also try directly after init (fallback for custom subdomains)
      await setDefaultAnimation(sdk);

      document.getElementById("status").textContent = "Customize your avatar, then click Next...";

      sdk.on("export", async (data) => {
        console.log("Export event received!", data);
        const dataUrl = data.url;

        document.getElementById("avaturn-sdk-container").style.display = "none";
        document.getElementById("status").textContent = " Uploading avatar to cloud...";
        setProgress(10);

        try {
          // Upload GLB to Cloudinary
          document.getElementById("status").textContent = " Uploading to Cloudinary...";
          setProgress(30);

          const cloudinaryUrl = await uploadToCloudinary(dataUrl);
          console.log("Cloudinary URL:", cloudinaryUrl);
          setProgress(70);

          // Save real HTTPS URL to Firebase
          document.getElementById("status").textContent = " Saving to Firebase...";
          await set(ref(db, "avatar/url"), cloudinaryUrl);
          await set(ref(db, "avatar/timestamp"), Date.now());
          setProgress(100);

          document.getElementById("success").style.display = "block";
          document.getElementById("status").textContent = " Done! Put on your headset!";

        } catch (err) {
          console.error(err);
          document.getElementById("status").textContent = " Error: " + err.message;
        }
      });
    };
  </script>
</body>
</html>
